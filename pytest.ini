[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
# Per-test wall-clock cap (#184). Generous vs the ~20 s e2e boot + slowest
# test; a genuinely hung test aborts with a stack dump instead of wedging the
# whole job. thread method is the Windows-safe one (no SIGALRM).
timeout = 120
timeout_method = thread
filterwarnings =
    ignore::DeprecationWarning:websockets.*
    ignore::DeprecationWarning:uvicorn.*
markers =
    smoke: end-to-end browser tests (tests/e2e; require live tray on 8445)
